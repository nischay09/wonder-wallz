
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/11.0.5/swiper-bundle.min.js"></script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .ww-section {
    font-family: 'Poppins', sans-serif;
    background: #fff;
    padding: 3rem 1rem 3.5rem;
    overflow: hidden;
  }

  .ww-eyebrow {
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #F97316;
    margin-bottom: 0.5rem;
  }

  .ww-heading {
    text-align: center;
    font-size: clamp(1.5rem, 4vw, 2.1rem);
    font-weight: 700;
    color: #1a1a2e;
    line-height: 1.25;
    margin-bottom: 0.6rem;
  }

  .ww-heading span {
    color: #8B2FC9;
  }

  .ww-sub {
    text-align: center;
    font-size: 14px;
    color: #64748b;
    max-width: 480px;
    margin: 0 auto 2.5rem;
    line-height: 1.6;
  }

  .swiper-outer {
    position: relative;
    max-width: 820px;
    margin: 0 auto;
    padding-bottom: 3rem;
  }

  .swiper { width: 100%; overflow: hidden; border-radius: 16px; }

  .swiper-slide {
    border-radius: 16px;
    overflow: hidden;
    background: #f8f5ff;
    box-shadow: 0 4px 32px rgba(139,47,201,0.10);
  }

  .slide-inner {
    display: flex;
    flex-direction: column;
  }

  .ba-compare {
    position: relative;
    width: 100%;
    aspect-ratio: 16/9;
    overflow: hidden;
    cursor: col-resize;
    user-select: none;
    touch-action: none;
  }

  .ba-after-img, .ba-before-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .ba-before-wrap {
    position: absolute;
    inset: 0;
    overflow: hidden;
    width: 50%;
    transition: width 0s;
  }

  .ba-before-wrap img {
    position: absolute;
    inset: 0;
    width: 100%;
    max-width: none;
    height: 100%;
    object-fit: cover;
    object-position: left center;
  }

  .ba-handle {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 3px;
    background: #fff;
    z-index: 10;
    pointer-events: none;
  }

  .ba-handle-btn {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid #8B2FC9;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #8B2FC9;
    gap: 2px;
    pointer-events: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }

  .ba-label {
    position: absolute;
    top: 12px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 20px;
    z-index: 5;
  }

  .ba-label.before {
    left: 12px;
    background: rgba(26,26,46,0.78);
    color: #fff;
  }

  .ba-label.after {
    right: 12px;
    background: rgba(139,47,201,0.88);
    color: #fff;
  }

  .slide-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.25rem;
    background: #fff;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .slide-room {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a2e;
  }

  .slide-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 20px;
    background: #F3E8FF;
    color: #6d1faa;
  }

  .slide-desc {
    font-size: 12.5px;
    color: #64748b;
    padding: 0 1.25rem 1rem;
    line-height: 1.55;
    background: #fff;
  }

  .swiper-button-next, .swiper-button-prev {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #8B2FC9;
    color: #fff;
    box-shadow: 0 2px 10px rgba(139,47,201,0.3);
    transition: background 0.2s;
  }

  .swiper-button-next::after, .swiper-button-prev::after {
    font-size: 14px;
    font-weight: 700;
  }

  .swiper-button-next:hover, .swiper-button-prev:hover { background: #F97316; }

  .swiper-pagination-bullet { background: #d1b3f0; opacity: 1; }
  .swiper-pagination-bullet-active { background: #8B2FC9; }

  .drag-hint {
    text-align: center;
    font-size: 11.5px;
    color: #a78bc0;
    margin-bottom: 1.5rem;
    letter-spacing: 0.5px;
  }

  @media (max-width: 600px) {
    .swiper-button-next, .swiper-button-prev { display: none; }
    .ww-section { padding: 2rem 0.5rem 2.5rem; }
  }
</style>

<section class="ww-section" aria-label="Before and after wall transformation showcase">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Wonder Wallz before and after wall transformation showcase</h2>
  <p class="ww-eyebrow">Wall Transformations</p>
  <h2 class="ww-heading">See the <span>Wonder</span> Happen</h2>
  <p class="ww-sub">Drag the slider to reveal our stunning before & after transformations — every wall tells a new story.</p>
  <p class="drag-hint">← drag to compare →</p>

  <div class="swiper-outer">
    <div class="swiper ww-swiper">
      <div class="swiper-wrapper" id="slideWrap"></div>
    </div>
    <div class="swiper-button-prev"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-pagination"></div>
  </div>
</section>

<script>
const slides = [
  {
    room: "Living Room — Feature Wall",
    tag: "Texture + Accent",
    desc: "Transformed a dull off-white wall into a bold teal 3D textured feature wall with custom geometric panelling.",
    before: "https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&q=80",
    after:  "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800&q=80"
  },
  {
    room: "Master Bedroom — Accent Wall",
    tag: "Mural + Paint",
    desc: "A plain cream bedroom got a dreamy hand-painted floral mural in soft lilac and sage tones.",
    before: "https://images.unsplash.com/photo-1616594039964-ae9021a400a0?w=800&q=80",
    after:  "https://images.unsplash.com/photo-1615873968403-89e068629265?w=800&q=80"
  },
  {
    room: "Office — Productivity Wall",
    tag: "Wallpaper",
    desc: "Replaced bare white walls with a premium dark botanical wallpaper that elevates focus and aesthetic.",
    before: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=800&q=80",
    after:  "https://images.unsplash.com/photo-1524758631624-e2822e304c36?w=800&q=80"
  },
  {
    room: "Kids Room — Story Wall",
    tag: "Hand-painted Mural",
    desc: "A white nursery wall became a vibrant jungle mural, sparking imagination for every little explorer.",
    before: "https://images.unsplash.com/photo-1588889218534-72d47a1d8c13?w=800&q=80",
    after:  "https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=800&q=80"
  },
  {
    room: "Dining Room — Statement Wall",
    tag: "Lime Wash",
    desc: "An aged lime-wash technique gave this dining space Old World Italian character and warmth.",
    before: "https://images.unsplash.com/photo-1461183923680-63c6c81a0a16?w=800&q=80",
    after:  "https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=800&q=80"
  }
];

const wrap = document.getElementById('slideWrap');

slides.forEach(s => {
  const div = document.createElement('div');
  div.className = 'swiper-slide';
  div.innerHTML = `
    <div class="slide-inner">
      <div class="ba-compare" data-pct="50">
        <img class="ba-after-img" src="${s.after}" alt="${s.room} after Wonder Wallz transformation" loading="lazy"/>
        <div class="ba-before-wrap">
          <img src="${s.before}" alt="${s.room} before Wonder Wallz transformation" loading="lazy"/>
        </div>
        <div class="ba-handle">
          <div class="ba-handle-btn">&#8249;&#8250;</div>
        </div>
        <span class="ba-label before">Before</span>
        <span class="ba-label after">After</span>
      </div>
      <div class="slide-info">
        <span class="slide-room">${s.room}</span>
        <span class="slide-tag">${s.tag}</span>
      </div>
      <p class="slide-desc">${s.desc}</p>
    </div>`;
  wrap.appendChild(div);
});

function initCompare(el) {
  const beforeWrap = el.querySelector('.ba-before-wrap');
  const handle = el.querySelector('.ba-handle');
  let dragging = false;

  function setPos(x) {
    const rect = el.getBoundingClientRect();
    let pct = Math.min(100, Math.max(0, ((x - rect.left) / rect.width) * 100));
    beforeWrap.style.width = pct + '%';
    handle.style.left = pct + '%';
  }

  el.addEventListener('mousedown', e => { dragging = true; setPos(e.clientX); });
  window.addEventListener('mousemove', e => { if (dragging) setPos(e.clientX); });
  window.addEventListener('mouseup', () => { dragging = false; });

  el.addEventListener('touchstart', e => { dragging = true; setPos(e.touches[0].clientX); }, { passive: true });
  el.addEventListener('touchmove', e => { if (dragging) setPos(e.touches[0].clientX); }, { passive: true });
  el.addEventListener('touchend', () => { dragging = false; });
}

document.querySelectorAll('.ba-compare').forEach(initCompare);

new Swiper('.ww-swiper', {
  slidesPerView: 1,
  spaceBetween: 24,
  loop: true,
  grabCursor: true,
  pagination: { el: '.swiper-pagination', clickable: true },
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  breakpoints: {
    640: { slidesPerView: 1 },
    900: { slidesPerView: 1 }
  }
});
</script>
